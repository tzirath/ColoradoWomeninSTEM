[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 8080

# Redirect all non-asset requests to index.html (SPA fallback)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
