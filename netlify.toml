[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# VITE_RECAPTCHA_SITE_KEY is a public key intentionally bundled into the
# client JS — it is not a secret. This tells Netlify's scanner to skip it.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_RECAPTCHA_SITE_KEY"

[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 8080

# Redirect all non-asset requests to index.html (SPA fallback)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
